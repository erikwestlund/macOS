- name: Ensure ~/.secrets exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.secrets"
    state: directory
    mode: "0700"

- name: Ensure ~/.config/secrets exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/secrets"
    state: directory
    mode: "0700"

- name: Write ~/.config/secrets/config from vault
  ansible.builtin.copy:
    dest: "{{ ansible_facts.env.HOME }}/.config/secrets/config"
    mode: "0600"
    content: |
      B2_KEY_ID={{ vault_b2_key_id }}
      B2_APP_KEY={{ vault_b2_app_key }}
      B2_BUCKET={{ vault_b2_bucket }}
      AGE_SECRET_KEY={{ vault_age_secret_key }}
      AGE_PUBLIC_KEY={{ vault_age_public_key }}
      MORGEN_API_KEY={{ vault_morgen_api_key | default('') }}
  no_log: true

- name: Ensure ~/.config/ghcr exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/ghcr"
    state: directory
    mode: "0700"

- name: Write ~/.config/ghcr/env from vault
  ansible.builtin.copy:
    dest: "{{ ansible_facts.env.HOME }}/.config/ghcr/env"
    mode: "0600"
    content: |
      GHCR_USERNAME={{ vault_ghcr_username }}
      GHCR_TOKEN={{ vault_ghcr_token }}
  no_log: true

- name: Pull secrets from B2
  ansible.builtin.command: "{{ ansible_facts.env.HOME }}/.bin/secrets-pull"
  changed_when: false

- name: Check if ~/.secrets/ssh exists
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.secrets/ssh"
  register: ssh_secrets_dir

- name: Ensure ~/.secrets/ssh exists for tracked SSH config
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.secrets/ssh"
    state: directory
    mode: "0700"

- name: Link tracked SSH config into secrets-backed SSH directory
  ansible.builtin.file:
    src: "{{ system_repo }}/config/ssh/config"
    dest: "{{ ansible_facts.env.HOME }}/.secrets/ssh/config"
    state: link
    force: true

- name: Check current ~/.ssh path
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.ssh"
  register: ssh_home_dir

- name: Migrate existing ~/.ssh contents into ~/.secrets/ssh
  ansible.builtin.shell: |
    set -euo pipefail
    shopt -s dotglob nullglob
    for item in "{{ ansible_facts.env.HOME }}/.ssh"/*; do
      name="$(basename "$item")"
      if [ "$name" = "." ] || [ "$name" = ".." ]; then
        continue
      fi
      if [ ! -e "{{ ansible_facts.env.HOME }}/.secrets/ssh/$name" ]; then
        mv "$item" "{{ ansible_facts.env.HOME }}/.secrets/ssh/$name"
      fi
    done
  args:
    executable: /bin/bash
  when:
    - ssh_home_dir.stat.isdir | default(false)
    - not (ssh_home_dir.stat.islnk | default(false))
  changed_when: true

- name: Remove existing ~/.ssh directory before symlink
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.ssh"
    state: absent
  when:
    - ssh_home_dir.stat.isdir | default(false)
    - not (ssh_home_dir.stat.islnk | default(false))

- name: Link ~/.ssh to ~/.secrets/ssh
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.secrets/ssh"
    dest: "{{ ansible_facts.env.HOME }}/.ssh"
    state: link
    force: true

- name: Set SSH private key permissions in secrets store
  ansible.builtin.shell: |
    find {{ ansible_facts.env.HOME }}/.secrets/ssh -type f ! -name "*.pub" ! -name "config" ! -name "known_hosts*" ! -name "authorized_keys" -exec chmod 600 {} \;
  changed_when: false

- name: Set SSH public file permissions in secrets store
  ansible.builtin.shell: |
    find {{ ansible_facts.env.HOME }}/.secrets/ssh -type f \( -name "*.pub" -o -name "config" -o -name "known_hosts*" -o -name "authorized_keys" \) -exec chmod 644 {} \;
  changed_when: false

- name: Check if hosts file exists in secrets
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.secrets/hosts"
  register: hosts_secret

- name: Deploy /etc/hosts from secrets
  become: true
  ansible.builtin.copy:
    src: "{{ ansible_facts.env.HOME }}/.secrets/hosts"
    dest: /etc/hosts
    remote_src: true
    mode: "0644"
  when: hosts_secret.stat.exists

- name: Check for OHDSI git credentials in secrets
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.secrets/git/git-credentials-ohdsi-jhu"
  register: git_credentials_secret

- name: Deploy OHDSI git credentials from secrets
  ansible.builtin.copy:
    src: "{{ ansible_facts.env.HOME }}/.secrets/git/git-credentials-ohdsi-jhu"
    dest: "{{ ansible_facts.env.HOME }}/.git-credentials-ohdsi-jhu"
    remote_src: true
    mode: "0600"
  when: git_credentials_secret.stat.exists
