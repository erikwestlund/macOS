    mode: "0755"

- name: Ensure yabai helper scripts are executable
  ansible.builtin.file:
    path: "{{ system_repo }}/config/yabai/{{ item }}"
    mode: "0755"
  loop:
    - open-new-claude.sh
    - open-new-chatgpt.sh
    - open-new-youtube.sh
    - focus-or-launch-app.sh
    - focus-or-launch-outlook.sh
    - focus-or-launch-teams.sh
    - open-new-chrome.sh
    - focus-active-space.sh
    - focus-absolute-space.sh
    - open-new-ghostty.sh
    - send-window-to-space-and-follow.sh
    - send-to-scratch-space.sh
    - toggle-scratch-space.sh

