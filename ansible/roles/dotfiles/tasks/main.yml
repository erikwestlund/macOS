    - com.erik.system.archive-screenshots-to-nas.plist
- name: Check screenshot organizer LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - print
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.organize-screenshots
  register: screenshot_organizer_agent_status
  changed_when: false
  failed_when: false

- name: Check keyboard remap LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - print
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.internal-keyboard-remap
  register: keyboard_remap_agent_status
  changed_when: false
  failed_when: false

- name: Check screenshot archive LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - print
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.archive-screenshots-to-nas
  register: screenshot_archive_agent_status
  changed_when: false
  failed_when: false

- name: Check downloads archive LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - print
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.archive-downloads-to-nas
  register: downloads_archive_agent_status
  changed_when: false
  failed_when: false

- name: Load keyboard remap LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - bootstrap
      - gui/{{ ansible_facts.user_uid }}
      - "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.internal-keyboard-remap.plist"
  when: keyboard_remap_agent_status.rc != 0

- name: Load screenshot organizer LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - bootstrap
      - gui/{{ ansible_facts.user_uid }}
      - "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.organize-screenshots.plist"
  when: screenshot_organizer_agent_status.rc != 0

- name: Load screenshot archive LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - bootstrap
      - gui/{{ ansible_facts.user_uid }}
      - "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.archive-screenshots-to-nas.plist"
  when: screenshot_archive_agent_status.rc != 0

- name: Load downloads archive LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - bootstrap
      - gui/{{ ansible_facts.user_uid }}
      - "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.archive-downloads-to-nas.plist"
  when: downloads_archive_agent_status.rc != 0

- name: Kickstart keyboard remap LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - kickstart
      - -k
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.internal-keyboard-remap
  changed_when: false

- name: Kickstart screenshot organizer LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - kickstart
      - -k
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.organize-screenshots
  changed_when: false

- name: Kickstart screenshot archive LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - kickstart
      - -k
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.archive-screenshots-to-nas
  changed_when: false

- name: Kickstart downloads archive LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
