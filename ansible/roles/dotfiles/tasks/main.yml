- name: Check for Neovim
  ansible.builtin.stat:
    path: "{{ nvim_bin }}"
  register: nvim_check

- name: Remove old OneDrive sync script
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.bin/onedrive-sync"
    state: absent

- name: Remove old OneDrive sync LaunchAgent
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.onedrive-sync.plist"
    state: absent

- name: Remove old Work OneDrive directory
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/Work/OneDrive"
    state: absent

- name: Bootstrap LazyVim
  ansible.builtin.command: "{{ nvim_bin }} --headless '+Lazy! sync' +qa"
  args:
    creates: "{{ ansible_facts.env.HOME }}/.local/share/nvim/lazy/LazyVim"
  when: nvim_check.stat.exists
