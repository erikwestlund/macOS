  ansible.builtin.file:
    src: "{{ system_repo }}/config/borders/bordersrc"
    dest: "{{ ansible_facts.env.HOME }}/.config/borders/bordersrc"
    state: link
    force: true

- name: Ensure keyboard remap script is executable
  ansible.builtin.file:
    path: "{{ system_repo }}/config/macos/apply-internal-keyboard-remap.sh"
    mode: "0755"

- name: Ensure web app icon script is executable
  ansible.builtin.file:
    path: "{{ system_repo }}/config/macos/install-web-app-icon.sh"
    mode: "0755"

- name: Link keyboard remap LaunchAgent
  ansible.builtin.file:
    src: "{{ system_repo }}/config/launchd/com.erik.system.internal-keyboard-remap.plist"
    dest: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.internal-keyboard-remap.plist"
    state: link
    force: true

- name: Check keyboard remap LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - print
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.internal-keyboard-remap
  register: keyboard_remap_agent_status
  changed_when: false
  failed_when: false

- name: Load keyboard remap LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - bootstrap
      - gui/{{ ansible_facts.user_uid }}
      - "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.erik.system.internal-keyboard-remap.plist"
  when: keyboard_remap_agent_status.rc != 0

- name: Kickstart keyboard remap LaunchAgent
  ansible.builtin.command:
    argv:
      - launchctl
      - kickstart
      - -k
      - gui/{{ ansible_facts.user_uid }}/com.erik.system.internal-keyboard-remap
  changed_when: false

- name: Check for Neovim
  ansible.builtin.stat:
    path: "{{ nvim_bin }}"
  register: nvim_check

- name: Bootstrap LazyVim
  ansible.builtin.command: "{{ nvim_bin }} --headless '+Lazy! sync' +qa"
  args:
    creates: "{{ ansible_facts.env.HOME }}/.local/share/nvim/lazy/LazyVim"
  when: nvim_check.stat.exists
