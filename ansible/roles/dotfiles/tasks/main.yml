    dest: "{{ ansible_facts.env.HOME }}/.config/yabai/{{ item }}"
    state: link
    force: true
  loop:
    - open-new-claude.sh
    - open-new-chatgpt.sh
    - open-new-youtube.sh
    - focus-or-launch-app.sh
    - focus-or-launch-outlook.sh
    - focus-or-launch-teams.sh
    - open-new-chrome.sh
