- name: Check for Homebrew
  ansible.builtin.stat:
    path: "{{ brew_bin }}"
  register: brew_check

- name: Stop if Homebrew is missing
  ansible.builtin.fail:
    msg: Homebrew must be installed before running this playbook.
  when: not brew_check.stat.exists

- name: Gather installed Brew formulae
  ansible.builtin.command: "{{ brew_bin }} list --formula"
  register: brew_formulae
  changed_when: false

- name: Gather installed Brew casks
  ansible.builtin.command: "{{ brew_bin }} list --cask"
  register: brew_casks
  changed_when: false

- name: Gather installed Mac App Store apps
  ansible.builtin.command: "{{ brew_bin }} exec mas list"
  register: mas_apps
  changed_when: false
  failed_when: false

- name: Gather configured Brew taps
  ansible.builtin.command: "{{ brew_bin }} tap"
  register: brew_taps
  changed_when: false

- name: Tap asmvik/formulae
  ansible.builtin.command: "{{ brew_bin }} tap asmvik/formulae"
  when: "'asmvik/formulae' not in brew_taps.stdout_lines"

- name: Tap FelixKratz/formulae
  ansible.builtin.command: "{{ brew_bin }} tap FelixKratz/formulae"
  when: "'felixkratz/formulae' not in brew_taps.stdout_lines"

- name: Tap r-lib/rig
  ansible.builtin.command: "{{ brew_bin }} tap r-lib/rig"
  when: "'r-lib/rig' not in brew_taps.stdout_lines"

- name: Install Brew formulae
  ansible.builtin.command: "{{ brew_bin }} install {{ item }}"
  loop:
    - age
    - ansible
    - awscli
    - borders
    - btop
    - composer
    - caddy
    - dnsmasq
    - doctl
    - duti
    - ffmpeg
    - gh
    - ghostscript
    - git-lfs
    - imagemagick
    - iperf3
    - jq
    - lazydocker
    - libpq
    - mas
    - media-control
    - mysql-client
    - nvm
    - openjdk
    - pandoc
    - php
    - pipx
    - playwright-cli
    - pngquant
    - poppler
    - qpdf
    - r
    - rclone
    - neovim
    - redis
    - sketchybar
    - skhd
    - starship
    - syncthing
    - tailscale
    - tmux
    - unpaper
    - yt-dlp
    - zsh-autosuggestions
    - zsh-completions
    - zsh-fast-syntax-highlighting
    - opencode
    - uv
    - wget
    - yabai
  when: item not in brew_formulae.stdout_lines

- name: Refresh sudo timestamp for Homebrew casks
  become: true
  ansible.builtin.command: /usr/bin/true
  changed_when: false

- name: Install Brew casks
  ansible.builtin.command:
    argv:
      - /usr/bin/script
      - -q
      - /dev/null
      - "{{ brew_bin }}"
      - install
      - --cask
      - "{{ item }}"
  loop:
    - bartender
    - bettertouchtool
    - cleanshot
    - fastmail
    - geekbench
    - google-chrome
    - iina
    - morgen
    - obsidian
    - orbstack
    - plex
    - positron
    - raycast
    - rstudio
    - slack
    - sonos
    - spotify
    - t3-code
    - tableplus
    - transmit
    - zed
    - zotero
    - ghostty
  when: item not in brew_casks.stdout_lines

- name: Install Mac App Store apps
  ansible.builtin.command: "{{ brew_bin }} exec mas install {{ item.id }}"
  loop:
    - { id: '425264550', name: 'Blackmagic Disk Speed Test' }
    - { id: '1289583905', name: 'Pixelmator Pro' }
    - { id: '889428659', name: 'xScope 4' }
  when:
    - mas_apps.rc == 0
    - item.id not in mas_apps.stdout

- name: Refresh sudo timestamp for privileged Homebrew casks
  become: true
  ansible.builtin.command: /usr/bin/true
  changed_when: false
  when: install_privileged_casks | default(false) | bool
  tags: [privileged_casks]

- name: Install privileged Homebrew casks
  ansible.builtin.command:
    argv:
      - /usr/bin/script
      - -q
      - /dev/null
      - "{{ brew_bin }}"
      - install
      - --cask
      - "{{ item }}"
  loop:
    - citrix-workspace
    - mactex
    - microsoft-excel
    - microsoft-outlook
    - microsoft-powerpoint
    - microsoft-teams
    - microsoft-word
    - quarto
    - r-lib/rig/rig
    - tailscale-app
    - windows-app
    - zoom
  when:
    - install_privileged_casks | default(false) | bool
    - item not in brew_casks.stdout_lines
  tags: [privileged_casks]

- name: Ensure ~/.nvm exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.nvm"
    state: directory
    mode: "0755"

- name: Refresh sudo timestamp for Homebrew font casks
  become: true
  ansible.builtin.command: /usr/bin/true
  changed_when: false

- name: Install Brew font casks
  ansible.builtin.command:
    argv:
      - /usr/bin/script
      - -q
      - /dev/null
      - "{{ brew_bin }}"
      - install
      - --cask
      - "{{ item }}"
  loop:
    - font-fira-code
    - font-jetbrains-mono
    - font-jetbrains-mono-nerd-font
    - font-symbols-only-nerd-font
  when: item not in brew_casks.stdout_lines
