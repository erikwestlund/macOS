- name: Check for Homebrew
  ansible.builtin.stat:
    path: "{{ brew_bin }}"
  register: brew_check

- name: Stop if Homebrew is missing
  ansible.builtin.fail:
    msg: Homebrew must be installed before running this playbook.
  when: not brew_check.stat.exists

- name: Gather installed Brew formulae
  ansible.builtin.command: "{{ brew_bin }} list --formula"
  register: brew_formulae
  changed_when: false

- name: Gather installed Brew casks
  ansible.builtin.command: "{{ brew_bin }} list --cask"
  register: brew_casks
  changed_when: false

- name: Gather configured Brew taps
  ansible.builtin.command: "{{ brew_bin }} tap"
  register: brew_taps
  changed_when: false

- name: Tap asmvik/formulae
  ansible.builtin.command: "{{ brew_bin }} tap asmvik/formulae"
  when: "'asmvik/formulae' not in brew_taps.stdout_lines"

- name: Tap FelixKratz/formulae
  ansible.builtin.command: "{{ brew_bin }} tap FelixKratz/formulae"
  when: "'felixkratz/formulae' not in brew_taps.stdout_lines"

- name: Tap r-lib/rig
  ansible.builtin.command: "{{ brew_bin }} tap r-lib/rig"
  when: "'r-lib/rig' not in brew_taps.stdout_lines"

- name: Uninstall Homebrew rclone on macOS
  ansible.builtin.command: "{{ brew_bin }} uninstall rclone"
  when: "'rclone' in brew_formulae.stdout_lines"

- name: Create temporary directory for rclone install
  ansible.builtin.tempfile:
    state: directory
    suffix: rclone
  register: rclone_tmpdir

- name: Download upstream rclone archive
  ansible.builtin.get_url:
    url: "https://downloads.rclone.org/rclone-current-osx-{{ 'arm64' if ansible_facts.architecture in ['arm64', 'aarch64'] else 'amd64' }}.zip"
    dest: "{{ rclone_tmpdir.path }}/rclone.zip"
    mode: "0644"

- name: Unarchive rclone release
  ansible.builtin.unarchive:
    src: "{{ rclone_tmpdir.path }}/rclone.zip"
    dest: "{{ rclone_tmpdir.path }}"
    remote_src: true

- name: Find extracted rclone binary
  ansible.builtin.find:
    paths: "{{ rclone_tmpdir.path }}"
    patterns: rclone
    recurse: true
    file_type: file
  register: rclone_binary

- name: Install upstream rclone binary
  become: true
  ansible.builtin.copy:
    src: "{{ (rclone_binary.files | map(attribute='path') | reject('search', '/scripts/') | list | first) }}"
    dest: /usr/local/bin/rclone
    mode: "0755"
    remote_src: true

- name: Remove temporary rclone install directory
  ansible.builtin.file:
    path: "{{ rclone_tmpdir.path }}"
    state: absent

- name: Install Brew formulae
  ansible.builtin.command: "{{ brew_bin }} install {{ item }}"
  loop:
    - age
    - ansible
    - awscli
    - borders
    - btop
    - composer
    - caddy
    - dnsmasq
    - doctl
    - duti
    - ffmpeg
    - gh
    - ghostscript
    - git-lfs
    - imagemagick
    - iperf3
    - jq
    - lazydocker
    - libpq
    - mas
    - media-control
    - mysql-client
    - nvm
    - openjdk
    - pandoc
    - php
    - pipx
    - playwright-cli
    - pngquant
    - poppler
    - quarto
    - qpdf
    - r
    - neovim
    - redis
    - sketchybar
    - skhd
    - starship
    - syncthing
    - tailscale-app
    - tailscale
    - tmux
    - unpaper
    - yt-dlp
    - zsh-autosuggestions
    - zsh-completions
    - zsh-fast-syntax-highlighting
    - opencode
    - uv
    - wget
    - yabai
  when: item not in brew_formulae.stdout_lines

- name: Install Brew casks
  ansible.builtin.command: "{{ brew_bin }} install --cask {{ item }}"
  loop:
    - bartender
    - bettertouchtool
    - cleanshot
    - citrix-workspace
    - fastmail
    - geekbench
    - google-chrome
    - iina
    - logi-options+
    - mactex
    - microsoft-excel
    - microsoft-outlook
    - microsoft-powerpoint
    - microsoft-teams
    - microsoft-word
    - morgen
    - obsidian
    - orbstack
    - plex
    - positron
    - raycast
    - r-lib/rig/rig
    - rstudio
    - slack
    - sonos
    - spotify
    - t3-code
    - tableplus
    - transmit
    - windows-app
    - zed
    - zotero
    - ghostty
    - zoom
  when: item not in brew_casks.stdout_lines

- name: Ensure ~/.nvm exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.nvm"
    state: directory
    mode: "0755"

- name: Install Brew font casks
  ansible.builtin.command: "{{ brew_bin }} install --cask {{ item }}"
  loop:
    - font-fira-code
    - font-jetbrains-mono
    - font-jetbrains-mono-nerd-font
    - font-symbols-only-nerd-font
  when: item not in brew_casks.stdout_lines
