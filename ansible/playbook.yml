- name: Configure this Mac
  hosts: localhost
  gather_facts: true
  vars_files:
    - vault/secrets.yml
  pre_tasks:
    - name: Check for ~/.machine
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.machine"
      register: machine_file

    - name: Check for managed passwordless sudo
      ansible.builtin.stat:
        path: "/private/etc/sudoers.d/{{ ansible_facts.user_id }}"
      register: passwordless_sudo_file

    - name: Read ~/.machine
      ansible.builtin.slurp:
        src: "{{ ansible_facts.env.HOME }}/.machine"
      register: machine_file_content
      when: machine_file.stat.exists

    - name: Set machine scope
      ansible.builtin.set_fact:
        machine_scope: "{{ machine_file_content.content | b64decode | trim }}"
      when: machine_file.stat.exists

    - name: Enable privileged casks after sudo bootstrap
      ansible.builtin.set_fact:
        install_privileged_casks: "{{ install_privileged_casks | default(passwordless_sudo_file.stat.exists) | bool }}"
  vars:
    borders_bin: /opt/homebrew/bin/borders
    system_repo: "{{ playbook_dir | dirname }}"
    brew_bin: /opt/homebrew/bin/brew
    nvim_bin: /opt/homebrew/bin/nvim
    sketchybar_bin: /opt/homebrew/bin/sketchybar
    skhd_bin: /opt/homebrew/bin/skhd
    yabai_bin: /opt/homebrew/bin/yabai

  roles:
    - role: packages
      tags: [packages]
    - role: dotfiles
      tags: [dotfiles]
    - role: secrets
      tags: [secrets]
    - role: localdev
      tags: [localdev, dns, caddy]
    - role: nas
      tags: [nas]
    - role: syncthing
      tags: [syncthing]
    - role: prefs
      tags: [prefs]

  tasks:
    - name: Apply laptop-only configuration
      ansible.builtin.include_role:
        name: laptop
      when: machine_scope | default('') == 'laptop'
      tags: [laptop]

    - name: Apply desktop-only configuration
      ansible.builtin.include_role:
        name: desktop
      when: machine_scope | default('') == 'desktop'
      tags: [desktop]
